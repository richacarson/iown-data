<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Capital Investments — Market Commentary</title>
<link rel="icon" type="image/x-icon" href="favicon.ico?v=20260608">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=20260608">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=20260608">
<link rel="manifest" href="site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600&family=Spectral+SC:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#171738; --bg-2:#101026; --surface:#1F1F45; --card:#252552; --card-2:#2B2B5E;
    --ink:#F4EFE4; --soft:#B8B4AC; --faint:#6E6A88; --line:#2C2C52; --line-2:#383866;
    --accent:#C9A84C; --accent-2:#D9BE73;
    --up:#94B971; --dn:#D58E66; --div:#BE9F62; --grw:#94B971; --dig:#D2A24E;
    --gate-bg-1:#1F1F45; --gate-bg-2:#101026;
    --display:'Spectral', Georgia, 'Times New Roman', serif;
    --sc:'Spectral SC','Spectral', Georgia, serif;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
    --maxw:760px; --measure:70ch;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--bg);
    background-image:radial-gradient(135% 80% at 50% -12%, #262656 0%, rgba(23,23,56,0) 58%);
    background-attachment:fixed;
    color:var(--ink); font-family:var(--display);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  body::after{ content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,0.018) 0.5px, transparent 0.5px); background-size:3px 3px; }
  ::selection{ background:rgba(201,168,76,0.26); color:var(--ink); }

  /* ═══ GATE ═══ */
  .gate{ position:fixed; inset:0; z-index:9000; background:radial-gradient(130% 90% at 50% -15%, var(--gate-bg-1) 0%, var(--gate-bg-2) 75%); display:flex; align-items:center; justify-content:center; transition:opacity .5s; }
  .gate::after{ content:""; position:absolute; inset:0; pointer-events:none; background-image:radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size:4px 4px; }
  .gate.hidden{ opacity:0; pointer-events:none; }
  .gate-box{ position:relative; z-index:1; text-align:center; width:380px; max-width:90vw; padding:0 1.6rem; }
  .gate-logo{ width:188px; height:auto; margin:0 auto 2.4rem; display:block; }
  .gate .eyebrow{ font-family:var(--sc); font-size:0.84rem; letter-spacing:0.34em; text-transform:uppercase; color:var(--accent); margin-bottom:1rem; }
  .gate h1{ font-family:var(--display); font-weight:500; font-size:2.2rem; color:var(--ink); letter-spacing:0.01em; margin-bottom:0.5rem; }
  .gate .sub{ font-family:var(--mono); font-size:0.56rem; letter-spacing:0.24em; text-transform:uppercase; color:var(--soft); margin-bottom:2rem; }
  .gate-rule{ width:34px; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent-2)); margin:0 auto 2.2rem; }
  .gate-input{ width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(227,199,127,0.30); color:var(--ink); font-family:var(--mono); font-size:0.8rem; padding:0.9rem 1rem; border-radius:6px; text-align:center; letter-spacing:0.18em; outline:none; transition:.2s; }
  .gate-input::placeholder{ color:var(--faint); }
  .gate-input:focus{ border-color:var(--accent); background:rgba(255,255,255,0.07); box-shadow:0 0 0 3px rgba(200,164,91,0.12); }
  .gate-input.error{ border-color:#D9776A; animation:shake .4s; }
  .gate-hint{ font-family:var(--mono); font-size:0.62rem; color:var(--soft); margin-top:0.9rem; min-height:1rem; letter-spacing:0.05em; }
  .gate-hint.error{ color:#E08A7C; }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* ═══ APP ═══ */
  .app{ display:none; position:relative; z-index:2; }
  .app.active{ display:block; }

  .masthead{ text-align:center; padding:2.9rem 1.5rem 0; max-width:var(--maxw); margin:0 auto; }
  .masthead .eyebrow{ font-family:var(--sc); font-size:0.9rem; letter-spacing:0.34em; text-transform:uppercase; color:var(--accent); margin-bottom:0.95rem; }
  .nameplate{ display:flex; align-items:center; justify-content:center; gap:1.4rem; }
  .nameplate .np-rule{ flex:1; height:1px; max-width:30%; background:var(--line-2); }
  .nameplate .np-rule:first-child{ background:linear-gradient(90deg,transparent,var(--accent)); }
  .nameplate .np-rule:last-child{ background:linear-gradient(90deg,var(--accent),transparent); }
  .masthead .mast-logo{ height:auto; width:210px; max-width:46%; display:block; }
  .folio{ position:relative; display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-top:1.1rem; padding:0.55rem 0; border-top:1px solid var(--accent); border-bottom:1px solid var(--accent); font-family:var(--mono); font-size:0.56rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--soft); }
  .folio::before{ content:""; position:absolute; left:0; right:0; top:2px; border-top:1px solid var(--line-2); }
  .folio::after{ content:""; position:absolute; left:0; right:0; bottom:2px; border-top:1px solid var(--line-2); }
  .folio .folio-c{ color:var(--ink); font-weight:600; letter-spacing:0.26em; }
  .folio span{ white-space:nowrap; }
  @media (max-width:600px){ .folio{ font-size:0.48rem; letter-spacing:0.1em; gap:0.5rem; } .nameplate .np-rule{ max-width:14%; } }

  .toolbar{ position:sticky; top:0; z-index:60; background:rgba(23,23,56,0.84); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-top:1px solid var(--line); border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:1rem; padding:0.7rem max(1.5rem, calc((100% - var(--maxw))/2)); }
  .tb-left{ display:flex; align-items:center; gap:0.7rem; min-width:0; }
  .tb-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; box-shadow:0 0 8px currentColor; }
  .tb-meta{ min-width:0; }
  .tb-date{ font-family:var(--mono); font-size:0.54rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--soft); }
  .tb-headline{ font-family:var(--display); font-size:1rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tb-actions{ display:flex; gap:0.4rem; flex-shrink:0; }
  .btn{ font-family:var(--mono); font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; font-weight:500; border:1px solid var(--line-2); background:transparent; color:var(--soft); padding:0.5rem 0.85rem; border-radius:5px; cursor:pointer; transition:all .16s; text-decoration:none; display:inline-flex; align-items:center; gap:0.35rem; }
  .btn:hover{ border-color:var(--accent); color:var(--accent); background:rgba(200,164,91,0.06); }
  .btn-primary{ background:linear-gradient(180deg,var(--accent-2),var(--accent)); color:#171738; border-color:var(--accent); font-weight:600; }
  .btn-primary:hover{ filter:brightness(1.07); color:#171738; }
  .btn-nav{ padding:0.5rem 0.62rem; }
  .btn:disabled{ opacity:0.3; cursor:default; }

  .scrim{ position:fixed; inset:0; background:rgba(0,0,0,0.62); z-index:190; opacity:0; pointer-events:none; transition:opacity .25s; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .drawer{ position:fixed; top:0; left:0; bottom:0; width:340px; max-width:84vw; z-index:200; background:var(--surface); border-right:1px solid var(--line-2); transform:translateX(-101%); transition:transform .3s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
  .drawer.open{ transform:translateX(0); box-shadow:0 0 60px rgba(0,0,0,0.6); }
  .drawer-head{ padding:1.5rem 1.5rem 1.1rem; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  .drawer-head .t{ font-family:var(--sc); font-size:0.95rem; letter-spacing:0.24em; text-transform:uppercase; color:var(--accent); }
  .drawer-close{ background:none; border:none; font-size:1.4rem; color:var(--soft); cursor:pointer; line-height:1; transition:color .15s; }
  .drawer-close:hover{ color:var(--ink); }
  .drawer-list{ flex:1; overflow-y:auto; padding:0.5rem 0; }
  .drawer-list::-webkit-scrollbar{ width:5px; } .drawer-list::-webkit-scrollbar-thumb{ background:#383866; border-radius:3px; }
  .dr-entry{ display:flex; align-items:baseline; gap:0.7rem; padding:0.85rem 1.5rem; cursor:pointer; border-left:2px solid transparent; transition:background .14s; }
  .dr-entry:hover{ background:rgba(200,164,91,0.07); }
  .dr-entry.active{ background:rgba(200,164,91,0.12); border-left-color:var(--accent); }
  .dr-dot{ width:6px; height:6px; border-radius:50%; flex-shrink:0; transform:translateY(-2px); }
  .dr-date{ font-family:var(--mono); font-size:0.55rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--soft); }
  .dr-headline{ font-family:var(--display); font-size:0.98rem; font-weight:500; line-height:1.25; margin-top:0.12rem; }

  .wrap{ max-width:var(--maxw); margin:0 auto; padding:3.4rem 1.6rem 6rem; }
  .commentary{ line-height:1.7; }
  @keyframes rise{ from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none} }

  /* ── Cover (centered, bracketed front-page deck) ── */
  .commentary .kicker{ font-family:var(--mono); font-size:0.6rem; letter-spacing:0.24em; text-transform:uppercase; color:var(--accent); text-align:center; margin-bottom:1rem; }
  .commentary .headline-display{ font-family:var(--display); font-weight:800; font-size:3.2rem; line-height:1.03; letter-spacing:-0.02em; text-align:center; max-width:20ch; margin:0 auto 0.9rem; padding-top:1.5rem; position:relative; animation:rise .6s ease both; }
  .commentary .headline-display::before{ content:""; position:absolute; top:0; left:50%; transform:translateX(-50%); width:96px; height:1px; background:var(--line-2); }
  .commentary .headline-display.up{ color:var(--up); } .commentary .headline-display.dn{ color:var(--dn); }
  .commentary .subhead-display{ font-family:var(--display); font-style:italic; font-weight:400; font-size:1.2rem; color:var(--soft); line-height:1.55; text-align:center; max-width:62ch; margin:0 auto; padding-bottom:1.6rem; border-bottom:1px solid var(--line-2); animation:rise .6s .08s ease both; }

  /* ── Performance summary ── */
  .perf-summary{ display:flex; gap:0; margin:2.6rem auto 2.8rem; border:1px solid var(--line-2); border-radius:10px; overflow:hidden; background:linear-gradient(180deg,var(--card-2),var(--surface)); animation:rise .6s .16s ease both; }
  .perf-summary-card{ flex:1; padding:1.3rem 1.5rem; position:relative; }
  .perf-summary-card + .perf-summary-card{ border-left:1px solid var(--line); }
  .strat-bar{ position:absolute; top:0; left:0; width:100%; height:3px; }
  .strat-bar.div{ background:linear-gradient(90deg,var(--div),transparent); } .strat-bar.grw{ background:linear-gradient(90deg,var(--grw),transparent); } .strat-bar.dig{ background:linear-gradient(90deg,var(--dig),transparent); }
  .ps-label{ font-family:var(--mono); font-size:0.56rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--soft); margin-bottom:0.4rem; }
  .ps-value{ font-family:var(--display); font-size:2rem; font-weight:600; line-height:1.04; }
  .ps-value.up{ color:var(--up); } .ps-value.dn{ color:var(--dn); }
  .ps-bench{ font-family:var(--mono); font-size:0.64rem; color:var(--soft); margin-top:0.35rem; letter-spacing:0.02em; }
  .ps-ytd{ font-family:var(--mono); font-size:0.64rem; margin-top:0.6rem; padding-top:0.6rem; border-top:1px solid var(--line); }
  .ps-ytd-label{ font-size:0.5rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--faint); margin-right:0.4rem; }
  .ps-ytd-val{ font-weight:600; } .ps-ytd-val.up{ color:var(--up); } .ps-ytd-val.dn{ color:var(--dn); }
  .ps-ytd-bench{ color:var(--soft); }
  @media (max-width:600px){ .perf-summary{ flex-direction:column; } .perf-summary-card + .perf-summary-card{ border-left:none; border-top:1px solid var(--line); } }

  /* ── Sections & prose ── */
  .commentary .section-head{ font-family:var(--mono); font-size:0.62rem; font-weight:600; letter-spacing:0.22em; text-transform:uppercase; color:var(--soft); margin:3rem 0 1.4rem; padding-bottom:0.7rem; position:relative; }
  .commentary .section-head::after{ content:""; position:absolute; bottom:0; left:0; width:100%; height:1px; background:var(--line); }
  .commentary .section-head::before{ content:""; position:absolute; bottom:-0.5px; left:0; width:34px; height:2px; background:var(--accent); z-index:1; }
  .commentary .section-head:first-child{ margin-top:0; }
  .commentary p{ font-family:var(--display); font-size:1.04rem; line-height:1.72; margin-bottom:1.05rem; color:var(--ink); text-align:justify; -webkit-hyphens:auto; hyphens:auto; }
  .commentary .lead{ font-size:1.1rem; }
  .commentary b{ font-weight:600; color:var(--ink); }
  .commentary .cmt-flow > p:first-child::first-letter{ float:left; font-family:var(--display); font-weight:700; font-size:3.3rem; line-height:0.74; padding:0.12rem 0.5rem 0 0; color:var(--accent); }
  .commentary .pullquote{ font-family:var(--display); font-style:italic; font-weight:400; font-size:1.3rem; line-height:1.5; color:var(--accent-2); text-align:center; margin:2rem auto; padding:1.5rem 1.4rem; border-top:1px solid var(--line-2); border-bottom:1px solid var(--line-2); }

  /* ── Movers ── */
  .commentary .movers-label{ font-family:var(--mono); font-size:0.6rem; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; margin:1.5rem 0 0.5rem; }
  .commentary .movers-label.winners{ color:var(--up); }
  .commentary .movers-label.decliners, .commentary .movers-label.losers{ color:var(--dn); }
  .commentary .mover{ display:flex; align-items:baseline; gap:0.7rem; padding:0.7rem 0; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .commentary .mover-ticker{ font-family:var(--mono); font-weight:600; font-size:0.82rem; color:var(--ink); width:56px; flex-shrink:0; }
  .commentary .mover-pct{ font-family:var(--mono); font-weight:500; font-size:0.82rem; width:66px; flex-shrink:0; }
  .commentary .mover-pct.up{ color:var(--up); } .commentary .mover-pct.dn{ color:var(--dn); }
  .commentary .mover-strategy{ font-family:var(--mono); font-size:0.54rem; letter-spacing:0.1em; text-transform:uppercase; margin-left:auto; flex-shrink:0; }
  .commentary .mover-strategy.div{ color:var(--div); } .commentary .mover-strategy.grw{ color:var(--grw); } .commentary .mover-strategy.dig{ color:var(--dig); }
  .commentary .mover-catalyst{ font-family:var(--display); font-size:0.97rem; color:var(--soft); width:100%; margin-top:0.18rem; line-height:1.55; }

  .loading, .empty{ text-align:center; padding:4rem 0; color:var(--soft); font-family:var(--display); font-style:italic; }
  .pdf-fallback{ text-align:center; padding:2.5rem; background:var(--surface); border:1px solid var(--line-2); border-radius:10px; margin:2rem 0; }
  .pdf-fallback p{ color:var(--soft); font-family:var(--display); font-style:italic; margin-bottom:1rem; }

  /* ═══ RESPONSIVE ═══ */
  @media (max-width:768px){
    .masthead{ padding-top:2.1rem; }
    .commentary .headline-display{ font-size:2.2rem; max-width:20ch; }
    .commentary .subhead-display{ font-size:1.05rem; }
    .toolbar{ padding-left:1rem; padding-right:1rem; }
    .wrap{ padding:2.6rem 1.3rem 5rem; }
    .commentary p{ text-align:left; -webkit-hyphens:none; hyphens:none; }
    .commentary .cmt-flow > p:first-child::first-letter{ font-size:2.8rem; }
  }

  /* Laptop — two-column newspaper spread that fills the screen */
  @media (min-width:1000px){
    :root{ --maxw:1160px; }
    .wrap{ padding:3.6rem 2.4rem 6rem; }
    .commentary .headline-display{ font-size:3.8rem; max-width:22ch; }
    .commentary .subhead-display{ font-size:1.22rem; }
    .commentary > p{ max-width:70ch; margin-left:auto; margin-right:auto; }

    .commentary .cmt-flow{ -webkit-column-count:2; column-count:2; -webkit-column-gap:3rem; column-gap:3rem; -webkit-column-rule:1px solid var(--line-2); column-rule:1px solid var(--line-2); }
    .commentary .cmt-flow > p, .commentary .cmt-flow .lead{ max-width:none; margin:0 0 0.95rem; font-size:0.99rem; line-height:1.66; }
    .commentary .cmt-flow .pullquote{ -webkit-column-span:all; column-span:all; -webkit-column-break-inside:avoid; break-inside:avoid; max-width:780px; margin:1.9rem auto; }

    .commentary .movers-grid{ -webkit-column-count:2; column-count:2; -webkit-column-gap:3rem; column-gap:3rem; -webkit-column-rule:1px solid var(--line-2); column-rule:1px solid var(--line-2); }
    .commentary .movers-grid .mover{ -webkit-column-break-inside:avoid; break-inside:avoid; max-width:none; }
  }

  /* Wide desktop — a third column for the lead story */
  @media (min-width:1500px){
    :root{ --maxw:1480px; }
    .wrap{ padding:3.8rem 3rem 6rem; }
    .commentary .headline-display{ font-size:4.2rem; max-width:24ch; }
    .commentary .subhead-display{ font-size:1.26rem; }
    .commentary .cmt-flow{ -webkit-column-count:3; column-count:3; }
  }

  /* Ultrawide */
  @media (min-width:2000px){
    :root{ --maxw:1760px; }
  }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-box">
    <img class="gate-logo" src="paradiem-logo-white.png" alt="Paradiem">
    <div class="eyebrow">Family Capital Investments</div>
    <h1>Market Commentary</h1>
    <div class="sub">Investment Committee</div>
    <div class="gate-rule"></div>
    <input type="password" class="gate-input" id="passInput" placeholder="Enter passcode" autocomplete="off" onkeydown="if(event.key==='Enter') checkPass()">
    <div class="gate-hint" id="gateHint">Press enter to continue</div>
  </div>
</div>

<div class="app" id="app">
  <div class="toolbar">
    <div class="tb-left">
      <span class="tb-dot" id="tbDot"></span>
      <div class="tb-meta"><div class="tb-date" id="tbDate"></div><div class="tb-headline" id="tbHeadline"></div></div>
    </div>
    <div class="tb-actions">
      <button class="btn btn-nav" onclick="openDrawer()" title="Archive">&#9776;</button>
      <button class="btn btn-nav" id="btnPrev" onclick="navPrev()">&laquo;</button>
      <button class="btn btn-nav" id="btnNext" onclick="navNext()">&raquo;</button>
      <a class="btn btn-primary" id="btnPdf" href="#" target="_blank">&darr;&nbsp;PDF</a>
    </div>
  </div>
  <header class="masthead">
    <div class="eyebrow">Family Capital Investments</div>
    <div class="nameplate"><span class="np-rule"></span><img class="mast-logo" src="paradiem-logo-white.png" alt="Paradiem"><span class="np-rule"></span></div>
    <div class="folio">
      <span class="folio-l" id="mastDate"></span>
      <span class="folio-c">Market Commentary</span>
      <span class="folio-r">Post-Close Edition</span>
    </div>
  </header>
  <div class="wrap"><div id="contentArea"><div class="loading">Loading commentary&hellip;</div></div></div>
</div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head"><span class="t">Archive</span><button class="drawer-close" onclick="closeDrawer()">&times;</button></div>
  <div class="drawer-list" id="drawerList"></div>
</aside>

<script>
const PASSCODE='ResearchSows';
const MANIFEST='commentary-manifest.json';
const DIR='commentaries';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let entries=[], idx=0;

function checkPass(){
  const i=document.getElementById('passInput'), h=document.getElementById('gateHint');
  if(i.value===PASSCODE){ localStorage.setItem('iown_auth','1'); enter(); }
  else { i.classList.add('error'); h.textContent='Incorrect passcode'; h.classList.add('error'); setTimeout(()=>i.classList.remove('error'),400); i.value=''; }
}
function enter(){
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.add('active');
  setTimeout(()=>document.getElementById('gate').style.display='none',500);
  loadApp();
}
function checkAuth(){ if(localStorage.getItem('iown_auth')==='1'){ document.getElementById('gate').style.display='none'; document.getElementById('app').classList.add('active'); loadApp(); } else { document.getElementById('passInput').focus(); } }

async function loadApp(){
  try {
    const res=await fetch(MANIFEST+'?v='+Date.now());
    entries=(await res.json()).sort((a,b)=>b.date.localeCompare(a.date));
    buildDrawer();
    if(entries.length) load(0); else document.getElementById('contentArea').innerHTML='<div class="empty">No commentaries available.</div>';
  } catch(e){ document.getElementById('contentArea').innerHTML='<div class="empty">Unable to load manifest.</div>'; }
}
function buildDrawer(){
  document.getElementById('drawerList').innerHTML=entries.map((e,i)=>{
    const d=new Date(e.date+'T12:00:00');
    return '<div class="dr-entry'+(i===0?' active':'')+'" onclick="load('+i+')">'+
      '<span class="dr-dot" style="background:var(--'+(e.direction==='up'?'up':'dn')+')"></span>'+
      '<div><div class="dr-date">'+MS[d.getMonth()]+' '+d.getDate()+'</div><div class="dr-headline">'+e.headline+'</div></div></div>';
  }).join('');
}
async function load(i){
  idx=i; const e=entries[i]; const d=new Date(e.date+'T12:00:00');
  document.querySelectorAll('.dr-entry').forEach((el,j)=>el.classList.toggle('active',j===i));
  document.getElementById('mastDate').textContent=DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate()+' '+d.getFullYear();
  document.getElementById('tbDate').textContent=DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate();
  document.getElementById('tbHeadline').textContent=e.headline;
  document.getElementById('tbDot').style.background='var(--'+(e.direction==='up'?'up':'dn')+')';
  const pdf=DIR+'/IOWN_Market_Commentary_'+e.date+'.pdf';
  document.getElementById('btnPdf').href=pdf;
  document.getElementById('btnPrev').disabled=i>=entries.length-1;
  document.getElementById('btnNext').disabled=i<=0;
  const area=document.getElementById('contentArea'); area.innerHTML='<div class="loading">Loading&hellip;</div>';
  if(e.content){
    try { const r=await fetch(DIR+'/'+e.content+'?v='+Date.now()); if(r.ok){ area.innerHTML='<div class="commentary">'+await r.text()+'</div>'; closeDrawer(); window.scrollTo(0,0); return; } } catch(err){}
  }
  area.innerHTML='<div class="commentary"><div class="headline-display '+(e.direction==='up'?'up':'dn')+'">'+e.headline+'</div>'+
    '<div class="subhead-display">'+(e.subhead||'')+'</div>'+
    '<div class="pdf-fallback"><p>HTML version coming soon for this date.</p>'+
    '<a class="btn btn-primary" href="'+pdf+'" target="_blank">&darr;&nbsp;Download PDF &mdash; '+e.date+'</a></div></div>';
  closeDrawer(); window.scrollTo(0,0);
}
function navPrev(){ if(idx<entries.length-1) load(idx+1); }
function navNext(){ if(idx>0) load(idx-1); }
function openDrawer(){ document.getElementById('drawer').classList.add('open'); document.getElementById('scrim').classList.add('show'); }
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('scrim').classList.remove('show'); }
document.addEventListener('keydown',e=>{ if(document.getElementById('gate').style.display==='none'){ if(e.key==='ArrowLeft')navPrev(); if(e.key==='ArrowRight')navNext(); }});
checkAuth();
</script>
</body>
</html>

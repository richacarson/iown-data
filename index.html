<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Capital Investments — Market Commentary</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#17140F; --surface:#211C15; --ink:#ECE6D8; --soft:#A89F8C; --line:#322B20;
    --accent:#C7A45A; --accent-2:#DDBB6E;
    --up:#8FB36A; --dn:#D08C6A; --div:#C99B5E; --grw:#8FB36A; --dig:#D9A24E;
    --gate-bg-1:#232017; --gate-bg-2:#14110C; --gate-ink:#EFE8DB; --gate-soft:#A89F8C; --gate-accent:#C7A45A;
    --display:'Spectral', Georgia, serif;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--ink); font-family:var(--display); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }

  /* ═══ GATE ═══ */
  .gate { position:fixed; inset:0; z-index:9000; background:radial-gradient(130% 90% at 50% -15%, var(--gate-bg-1) 0%, var(--gate-bg-2) 75%); display:flex; align-items:center; justify-content:center; transition:opacity .5s; }
  .gate::after { content:""; position:absolute; inset:0; pointer-events:none; background-image:radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size:4px 4px; }
  .gate.hidden { opacity:0; pointer-events:none; }
  .gate-box { position:relative; z-index:1; text-align:center; width:370px; padding:0 1.6rem; }
  .gate-logo { width:184px; height:auto; margin:0 auto 2.3rem; display:block; }
  .gate .eyebrow { font-family:var(--mono); font-size:0.58rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--gate-accent); margin-bottom:0.8rem; }
  .gate h1 { font-family:var(--display); font-weight:400; font-size:2.15rem; color:var(--gate-ink); letter-spacing:0.01em; margin-bottom:0.5rem; }
  .gate .sub { font-family:var(--mono); font-size:0.56rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--gate-soft); margin-bottom:2.3rem; }
  .gate-rule { width:32px; height:1.5px; background:var(--gate-accent); margin:0 auto 2.3rem; }
  .gate-input { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.22); color:var(--gate-ink); font-family:var(--mono); font-size:0.8rem; padding:0.85rem 1rem; border-radius:5px; text-align:center; letter-spacing:0.16em; outline:none; transition:.2s; }
  .gate-input::placeholder { color:var(--gate-soft); }
  .gate-input:focus { border-color:var(--gate-accent); background:rgba(255,255,255,0.08); }
  .gate-input.error { border-color:#D9776A; animation:shake .4s; }
  .gate-hint { font-family:var(--mono); font-size:0.62rem; color:var(--gate-soft); margin-top:0.9rem; min-height:1rem; letter-spacing:0.04em; }
  .gate-hint.error { color:#E08A7C; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* ═══ APP ═══ */
  .app { display:none; }
  .app.active { display:block; }
  .masthead { text-align:center; padding:2.6rem 1.5rem 0; max-width:880px; margin:0 auto; }
  .masthead .eyebrow { font-family:var(--mono); font-size:0.58rem; letter-spacing:0.34em; text-transform:uppercase; color:var(--accent); margin-bottom:1rem; }
  .masthead .mast-logo { height:auto; width:230px; max-width:62%; margin:0 auto 1.3rem; display:block; }
  .mast-rule { border:0; border-top:2px solid var(--ink); margin:0; }
  .mast-rule::after { content:""; display:block; border-top:1px solid var(--ink); margin-top:3px; }
  .mast-meta { font-family:var(--mono); font-size:0.58rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--soft); padding:0.7rem 0 0; display:flex; justify-content:center; gap:0.9rem; flex-wrap:wrap; }
  .mast-meta b { color:var(--ink); font-weight:500; }

  .toolbar { position:sticky; top:0; z-index:60; background:rgba(23,20,15,0.86); backdrop-filter:blur(10px); border-top:1px solid var(--line); border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:1rem; padding:0.7rem max(1.5rem, calc((100% - 820px)/2)); }
  .tb-left { display:flex; align-items:center; gap:0.7rem; min-width:0; }
  .tb-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .tb-meta { min-width:0; }
  .tb-date { font-family:var(--mono); font-size:0.54rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--soft); }
  .tb-headline { font-family:var(--display); font-size:1rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tb-actions { display:flex; gap:0.4rem; flex-shrink:0; }
  .btn { font-family:var(--mono); font-size:0.6rem; letter-spacing:0.08em; text-transform:uppercase; font-weight:500; border:1px solid var(--line); background:transparent; color:var(--soft); padding:0.5rem 0.8rem; border-radius:4px; cursor:pointer; transition:all .15s; text-decoration:none; display:inline-flex; align-items:center; gap:0.35rem; }
  .btn:hover { border-color:var(--accent); color:var(--accent); }
  .btn-primary { background:var(--accent); color:#1A1710; border-color:var(--accent); }
  .btn-primary:hover { background:var(--accent-2); border-color:var(--accent-2); color:#1A1710; }
  .btn-nav { padding:0.5rem 0.6rem; }
  .btn:disabled { opacity:0.3; cursor:default; }

  .scrim { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:190; opacity:0; pointer-events:none; transition:opacity .25s; }
  .scrim.show { opacity:1; pointer-events:auto; }
  .drawer { position:fixed; top:0; left:0; bottom:0; width:330px; max-width:84vw; z-index:200; background:var(--surface); border-right:1px solid var(--line); transform:translateX(-101%); transition:transform .28s ease; display:flex; flex-direction:column; }
  .drawer.open { transform:translateX(0); box-shadow:0 0 50px rgba(0,0,0,0.5); }
  .drawer-head { padding:1.4rem 1.4rem 1rem; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  .drawer-head .t { font-family:var(--mono); font-size:0.6rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--accent); }
  .drawer-close { background:none; border:none; font-size:1.3rem; color:var(--soft); cursor:pointer; line-height:1; }
  .drawer-list { flex:1; overflow-y:auto; padding:0.4rem 0; }
  .drawer-list::-webkit-scrollbar { width:4px; } .drawer-list::-webkit-scrollbar-thumb { background:#3C3526; border-radius:2px; }
  .dr-entry { display:flex; align-items:baseline; gap:0.7rem; padding:0.8rem 1.4rem; cursor:pointer; border-left:2px solid transparent; transition:background .12s; }
  .dr-entry:hover { background:rgba(199,164,90,0.08); }
  .dr-entry.active { background:rgba(199,164,90,0.13); border-left-color:var(--accent); }
  .dr-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; transform:translateY(-2px); }
  .dr-date { font-family:var(--mono); font-size:0.55rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--soft); }
  .dr-headline { font-family:var(--display); font-size:0.95rem; font-weight:500; line-height:1.25; margin-top:0.1rem; }

  .wrap { max-width:760px; margin:0 auto; padding:3rem 1.5rem 6rem; }
  .commentary { line-height:1.7; animation:rise .5s ease both; }
  @keyframes rise { from{opacity:0; transform:translateY(8px)} to{opacity:1} }
  .commentary .kicker { font-family:var(--mono); font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--accent); margin-bottom:0.9rem; }
  .commentary .headline-display { font-family:var(--display); font-weight:600; font-size:3.1rem; line-height:1.03; letter-spacing:-0.015em; margin-bottom:0.8rem; }
  .commentary .headline-display.up { color:var(--up); } .commentary .headline-display.dn { color:var(--dn); }
  .commentary .subhead-display { font-family:var(--display); font-style:italic; font-weight:400; font-size:1.12rem; color:var(--soft); line-height:1.5; margin-bottom:2rem; padding-bottom:1.5rem; border-bottom:1px solid var(--line); }

  .perf-summary { display:flex; gap:0; margin-bottom:2.4rem; border:1px solid var(--line); border-radius:8px; overflow:hidden; background:var(--surface); }
  .perf-summary-card { flex:1; padding:1.05rem 1.15rem; position:relative; }
  .perf-summary-card + .perf-summary-card { border-left:1px solid var(--line); }
  .strat-bar { position:absolute; top:0; left:0; width:100%; height:3px; }
  .strat-bar.div{background:var(--div);} .strat-bar.grw{background:var(--grw);}
  .ps-label { font-family:var(--mono); font-size:0.55rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--soft); margin-bottom:0.35rem; }
  .ps-value { font-family:var(--display); font-size:1.85rem; font-weight:600; line-height:1.05; }
  .ps-value.up{color:var(--up);} .ps-value.dn{color:var(--dn);}
  .ps-bench { font-family:var(--mono); font-size:0.62rem; color:var(--soft); margin-top:0.3rem; }
  .ps-ytd { font-family:var(--mono); font-size:0.62rem; margin-top:0.5rem; padding-top:0.5rem; border-top:1px solid var(--line); }
  .ps-ytd-label { font-size:0.5rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--soft); margin-right:0.35rem; }
  .ps-ytd-val { font-weight:600; } .ps-ytd-val.up{color:var(--up);} .ps-ytd-val.dn{color:var(--dn);}
  .ps-ytd-bench { color:var(--soft); }
  @media (max-width:600px){ .perf-summary{flex-direction:column;} .perf-summary-card+.perf-summary-card{border-left:none; border-top:1px solid var(--line);} }

  .commentary .section-head { font-family:var(--mono); font-size:0.64rem; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink); margin:2.8rem 0 1.2rem; padding-bottom:0.55rem; position:relative; }
  .commentary .section-head::after { content:""; position:absolute; bottom:0; left:0; width:100%; height:1px; background:var(--line); }
  .commentary .section-head::before { content:""; position:absolute; bottom:-0.5px; left:0; width:34px; height:2px; background:var(--accent); z-index:1; }
  .commentary .section-head:first-child { margin-top:0; }
  .commentary p { font-family:var(--display); font-size:1.05rem; line-height:1.75; margin-bottom:1.15rem; }
  .commentary .lead { font-size:1.1rem; }
  .commentary b { font-weight:600; }
  .commentary .pullquote { font-family:var(--display); font-style:italic; font-weight:400; font-size:1.3rem; line-height:1.45; color:var(--accent); border-left:2px solid var(--accent); padding:0.3rem 0 0.3rem 1.4rem; margin:2rem 0; }

  .commentary .movers-label { font-family:var(--mono); font-size:0.6rem; font-weight:600; letter-spacing:0.13em; text-transform:uppercase; margin:1.4rem 0 0.5rem; }
  .commentary .movers-label.winners{color:var(--up);}
  .commentary .movers-label.decliners, .commentary .movers-label.losers{color:var(--dn);}
  .commentary .mover { display:flex; align-items:baseline; gap:0.7rem; padding:0.65rem 0; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .commentary .mover-ticker { font-family:var(--mono); font-weight:600; font-size:0.82rem; width:54px; flex-shrink:0; }
  .commentary .mover-pct { font-family:var(--mono); font-weight:500; font-size:0.82rem; width:64px; flex-shrink:0; }
  .commentary .mover-pct.up{color:var(--up);} .commentary .mover-pct.dn{color:var(--dn);}
  .commentary .mover-strategy { font-family:var(--mono); font-size:0.56rem; letter-spacing:0.07em; text-transform:uppercase; margin-left:auto; flex-shrink:0; }
  .commentary .mover-strategy.div{color:var(--div);} .commentary .mover-strategy.grw{color:var(--grw);} .commentary .mover-strategy.dig{color:var(--dig);}
  .commentary .mover-catalyst { font-family:var(--display); font-size:0.96rem; color:var(--soft); width:100%; margin-top:0.15rem; }

  .loading, .empty { text-align:center; padding:4rem 0; color:var(--soft); font-family:var(--display); font-style:italic; }
  .pdf-fallback { text-align:center; padding:2.5rem; background:var(--surface); border:1px solid var(--line); border-radius:8px; margin:2rem 0; }
  .pdf-fallback p { color:var(--soft); font-family:var(--display); font-style:italic; margin-bottom:1rem; }

  @media (max-width:768px){
    .masthead{ padding-top:2rem; } .commentary .headline-display{ font-size:2.15rem; } .toolbar{ padding-left:1rem; padding-right:1rem; }
  }
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-box">
    <img class="gate-logo" src="paradiem-logo-white.png" alt="Paradiem">
    <div class="eyebrow">Family Capital Investments</div>
    <h1>Market Commentary</h1>
    <div class="sub">Investment Committee</div>
    <div class="gate-rule"></div>
    <input type="password" class="gate-input" id="passInput" placeholder="Enter passcode" autocomplete="off" onkeydown="if(event.key==='Enter') checkPass()">
    <div class="gate-hint" id="gateHint">Press enter to continue</div>
  </div>
</div>

<div class="app" id="app">
  <div class="toolbar">
    <div class="tb-left">
      <span class="tb-dot" id="tbDot"></span>
      <div class="tb-meta"><div class="tb-date" id="tbDate"></div><div class="tb-headline" id="tbHeadline"></div></div>
    </div>
    <div class="tb-actions">
      <button class="btn btn-nav" onclick="openDrawer()" title="Archive">&#9776;</button>
      <button class="btn btn-nav" id="btnPrev" onclick="navPrev()">&laquo;</button>
      <button class="btn btn-nav" id="btnNext" onclick="navNext()">&raquo;</button>
      <a class="btn btn-primary" id="btnPdf" href="#" target="_blank">&darr;&nbsp;PDF</a>
    </div>
  </div>
  <header class="masthead">
    <div class="eyebrow">Family Capital Investments</div>
    <img class="mast-logo" src="paradiem-logo-white.png" alt="Paradiem">
    <hr class="mast-rule">
    <div class="mast-meta">
      <span id="mastDate"></span><span>&middot;</span><span><b>Market Commentary</b></span><span>&middot;</span><span>Post-Close</span>
    </div>
  </header>
  <div class="wrap"><div id="contentArea"><div class="loading">Loading commentary&hellip;</div></div></div>
</div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head"><span class="t">Archive</span><button class="drawer-close" onclick="closeDrawer()">&times;</button></div>
  <div class="drawer-list" id="drawerList"></div>
</aside>

<script>
const PASSCODE='ResearchSows';
const MANIFEST='commentary-manifest.json';
const DIR='commentaries';
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let entries=[], idx=0;

function checkPass(){
  const i=document.getElementById('passInput'), h=document.getElementById('gateHint');
  if(i.value===PASSCODE){ localStorage.setItem('iown_auth','1'); enter(); }
  else { i.classList.add('error'); h.textContent='Incorrect passcode'; h.classList.add('error'); setTimeout(()=>i.classList.remove('error'),400); i.value=''; }
}
function enter(){
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.add('active');
  setTimeout(()=>document.getElementById('gate').style.display='none',500);
  loadApp();
}
function checkAuth(){ if(localStorage.getItem('iown_auth')==='1'){ document.getElementById('gate').style.display='none'; document.getElementById('app').classList.add('active'); loadApp(); } else { document.getElementById('passInput').focus(); } }

async function loadApp(){
  try {
    const res=await fetch(MANIFEST+'?v='+Date.now());
    entries=(await res.json()).sort((a,b)=>b.date.localeCompare(a.date));
    buildDrawer();
    if(entries.length) load(0); else document.getElementById('contentArea').innerHTML='<div class="empty">No commentaries available.</div>';
  } catch(e){ document.getElementById('contentArea').innerHTML='<div class="empty">Unable to load manifest.</div>'; }
}
function buildDrawer(){
  document.getElementById('drawerList').innerHTML=entries.map((e,i)=>{
    const d=new Date(e.date+'T12:00:00');
    return '<div class="dr-entry'+(i===0?' active':'')+'" onclick="load('+i+')">'+
      '<span class="dr-dot" style="background:var(--'+(e.direction==='up'?'up':'dn')+')"></span>'+
      '<div><div class="dr-date">'+MS[d.getMonth()]+' '+d.getDate()+'</div><div class="dr-headline">'+e.headline+'</div></div></div>';
  }).join('');
}
async function load(i){
  idx=i; const e=entries[i]; const d=new Date(e.date+'T12:00:00');
  document.querySelectorAll('.dr-entry').forEach((el,j)=>el.classList.toggle('active',j===i));
  document.getElementById('mastDate').textContent=DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate()+' '+d.getFullYear();
  document.getElementById('tbDate').textContent=DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate();
  document.getElementById('tbHeadline').textContent=e.headline;
  document.getElementById('tbDot').style.background='var(--'+(e.direction==='up'?'up':'dn')+')';
  const pdf=DIR+'/IOWN_Market_Commentary_'+e.date+'.pdf';
  document.getElementById('btnPdf').href=pdf;
  document.getElementById('btnPrev').disabled=i>=entries.length-1;
  document.getElementById('btnNext').disabled=i<=0;
  const area=document.getElementById('contentArea'); area.innerHTML='<div class="loading">Loading&hellip;</div>';
  if(e.content){
    try { const r=await fetch(DIR+'/'+e.content+'?v='+Date.now()); if(r.ok){ area.innerHTML='<div class="commentary">'+await r.text()+'</div>'; closeDrawer(); window.scrollTo(0,0); return; } } catch(err){}
  }
  area.innerHTML='<div class="commentary"><div class="headline-display '+(e.direction==='up'?'up':'dn')+'">'+e.headline+'</div>'+
    '<div class="subhead-display">'+(e.subhead||'')+'</div>'+
    '<div class="pdf-fallback"><p>HTML version coming soon for this date.</p>'+
    '<a class="btn btn-primary" href="'+pdf+'" target="_blank">&darr;&nbsp;Download PDF &mdash; '+e.date+'</a></div></div>';
  closeDrawer(); window.scrollTo(0,0);
}
function navPrev(){ if(idx<entries.length-1) load(idx+1); }
function navNext(){ if(idx>0) load(idx-1); }
function openDrawer(){ document.getElementById('drawer').classList.add('open'); document.getElementById('scrim').classList.add('show'); }
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('scrim').classList.remove('show'); }
document.addEventListener('keydown',e=>{ if(document.getElementById('gate').style.display==='none'){ if(e.key==='ArrowLeft')navPrev(); if(e.key==='ArrowRight')navNext(); }});
checkAuth();
</script>
</body>
</html>

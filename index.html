<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOWN Market Commentary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A1A1A;
    --bg: #FAF9F7;
    --cream: #F5F3EF;
    --accent-up: #5A7A3A;
    --accent-dn: #8B3A3A;
    --rule: #D4D0C8;
    --muted: #8A8A84;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Masthead ── */
  .masthead {
    background: var(--ink);
    color: var(--bg);
    text-align: center;
    padding: 2.5rem 1rem 2rem;
  }
  .masthead-eyebrow {
    font-family: var(--sans);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 0.5rem;
  }
  .masthead h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 2.4rem;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }
  .masthead-sub {
    font-family: var(--sans);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #777;
    margin-top: 0.6rem;
  }
  .masthead-rule {
    width: 60px;
    height: 2px;
    background: var(--accent-up);
    margin: 1rem auto 0;
  }

  /* ── Container ── */
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }

  /* ── Archive List ── */
  .archive-header {
    text-align: center;
    padding: 2rem 0 1rem;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .entry {
    display: flex;
    align-items: flex-start;
    gap: 1.2rem;
    padding: 1.4rem 0;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .entry:hover {
    background: var(--cream);
    margin: 0 -1rem;
    padding-left: 1rem;
    padding-right: 1rem;
    border-radius: 4px;
  }
  .entry:first-child {
    border-top: 1px solid var(--rule);
  }

  .entry-date {
    flex-shrink: 0;
    width: 52px;
    text-align: center;
  }
  .entry-date .month {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    line-height: 1;
  }
  .entry-date .day {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 600;
    line-height: 1.1;
  }
  .entry-date .dow {
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .entry-dir {
    flex-shrink: 0;
    width: 8px;
    margin-top: 0.55rem;
  }
  .entry-dir .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .dot-up { background: var(--accent-up); }
  .dot-dn { background: var(--accent-dn); }

  .entry-body {
    flex: 1;
    min-width: 0;
  }
  .entry-headline {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }
  .entry-subhead {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.45;
  }

  .entry-dl {
    flex-shrink: 0;
    align-self: center;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--rule);
    padding: 0.35rem 0.7rem;
    border-radius: 3px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .entry:hover .entry-dl {
    border-color: var(--ink);
    color: var(--ink);
  }

  /* ── PDF Viewer ── */
  .viewer {
    display: none;
    margin: 2rem 0;
  }
  .viewer.active {
    display: block;
  }
  .viewer-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.8rem 0;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 1rem;
  }
  .viewer-title {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 600;
  }
  .viewer-close {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border: 1px solid var(--rule);
    padding: 0.3rem 0.6rem;
    border-radius: 3px;
    background: none;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .viewer-close:hover {
    border-color: var(--ink);
    color: var(--ink);
  }
  .viewer iframe {
    width: 100%;
    height: 80vh;
    border: 1px solid var(--rule);
    border-radius: 4px;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 2.5rem 0;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    border-top: 1px solid var(--rule);
    margin-top: 2rem;
  }

  /* ── Empty State ── */
  .empty {
    text-align: center;
    padding: 4rem 0;
    color: var(--muted);
    font-size: 0.85rem;
  }

  @media (max-width: 640px) {
    .masthead h1 { font-size: 1.8rem; }
    .entry { gap: 0.8rem; }
    .entry-headline { font-size: 1.1rem; }
    .entry-dl { display: none; }
    .entry-date .day { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-eyebrow">Intentional Ownership · Investment Committee</div>
  <h1>Market Commentary</h1>
  <div class="masthead-sub">Post-Close Daily Analysis</div>
  <div class="masthead-rule"></div>
</div>

<div class="container">
  <div class="archive-header">Archive · <span id="count">—</span> Commentaries</div>

  <div class="viewer" id="viewer">
    <div class="viewer-bar">
      <span class="viewer-title" id="viewer-title"></span>
      <button class="viewer-close" onclick="closeViewer()">✕ Close</button>
    </div>
    <iframe id="viewer-frame" src="about:blank"></iframe>
  </div>

  <div id="entries"></div>

  <div class="footer">
    Confidential · Intentional Ownership (IOWN) · RIA · Paradiem
  </div>
</div>

<script>
const MANIFEST = 'commentary-manifest.json';
const PDF_DIR  = 'commentaries';

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function formatDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return {
    month: MONTHS[d.getMonth()],
    day: d.getDate(),
    dow: DAYS[d.getDay()]
  };
}

function pdfName(iso) {
  return `${PDF_DIR}/IOWN_Market_Commentary_${iso}.pdf`;
}

function openViewer(iso, headline) {
  const v = document.getElementById('viewer');
  const f = document.getElementById('viewer-frame');
  const t = document.getElementById('viewer-title');
  t.textContent = headline + ' — ' + iso;
  f.src = pdfName(iso);
  v.classList.add('active');
  v.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeViewer() {
  const v = document.getElementById('viewer');
  const f = document.getElementById('viewer-frame');
  v.classList.remove('active');
  f.src = 'about:blank';
}

async function init() {
  try {
    const res = await fetch(MANIFEST);
    const data = await res.json();
    const sorted = data.sort((a, b) => b.date.localeCompare(a.date));

    document.getElementById('count').textContent = sorted.length;
    const el = document.getElementById('entries');

    if (!sorted.length) {
      el.innerHTML = '<div class="empty">No commentaries yet.</div>';
      return;
    }

    el.innerHTML = sorted.map(e => {
      const d = formatDate(e.date);
      const dirClass = e.direction === 'up' ? 'dot-up' : 'dot-dn';
      return `
        <a class="entry" onclick="openViewer('${e.date}', '${e.headline.replace(/'/g, "\\'")}'); return false;" href="${pdfName(e.date)}">
          <div class="entry-date">
            <div class="month">${d.month}</div>
            <div class="day">${d.day}</div>
            <div class="dow">${d.dow}</div>
          </div>
          <div class="entry-dir"><div class="dot ${dirClass}"></div></div>
          <div class="entry-body">
            <div class="entry-headline">${e.headline}</div>
            <div class="entry-subhead">${e.subhead}</div>
          </div>
          <div class="entry-dl">↓ PDF</div>
        </a>`;
    }).join('');
  } catch (err) {
    document.getElementById('entries').innerHTML =
      '<div class="empty">Unable to load commentaries.</div>';
    console.error(err);
  }
}

init();
</script>
</body>
</html>
